services:
  mysql:
    image: mysql:8.0
    container_name: zekin-mysql-local
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zekin
      MYSQL_USER: zekin
      MYSQL_PASSWORD: zekin123
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ../specs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 可选：Redis（Sprint 2）
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
